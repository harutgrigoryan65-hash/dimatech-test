services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: test_pythonmid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_pythonmid"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/test_pythonmid
      JWT_SECRET: dev-jwt-secret
      PAYMENT_SECRET_KEY: gfdmhghif38yrf9ew0jkf32
      HOST: 0.0.0.0
      PORT: 3993
    ports:
      - "3993:3993"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
